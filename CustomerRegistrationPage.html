<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Customer Registration</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body style="background-color: #918f8f;">

    <div style="background-color: rgb(0, 6, 97); padding: 18px; text-align: center; color: #FFFDD0;">
        <h1>OYERA BAY SERVICE</h1>
        <div style="color: #ffd900;">
            <h2>Service System</h2>
        </div>
        <p class="mb-0">Welcome to our Service System Portal</p>
    </div>

    <div class="container my-4" style="max-width: 600px;">
        <div class="card p-4 shadow-sm">
            <h4 class="mb-3 text-center">Client Register</h4>
            
            <form>
                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" required>
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" required>
                </div>

                <div class="mb-3">
                    <label for="phoneNumber" class="form-label">Phone number</label>
                    <input type="tel" class="form-control" id="phoneNumber" required>
                </div>

                <div class="mb-3">
                    <label for="branch" class="form-label">Vehicle Registration Number </label>
                    <input type="text" class="form-control" id="branch">
                </div>

                <div class="mb-3">
                    <label for="department" class="form-label">Reason for visit</label>
                    <input type="text" class="form-control" id="department">
                </div>

                <div class="mb-3">
                    <label for="experience" class="form-label">date</label>
                    <input type="number" class="form-control" id="experience" min="0">
                    <div id="emailHelp" class="form-text">dd/mm/yyyy.</div>
                </div>

                <div class="mb-3">
                    <label for="expertise" class="form-label">Address</label>
                    <input type="text" class="form-control" id="expertise">
                </div>

                <div class="mb-3">
                    <label for="emailAddress" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="emailAddress" aria-describedby="emailHelp" required>
                    <div id="emailHelp" class="form-text">All documentation will be sent to this email.
                    </div>
                </div>

            
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="termsCheck" required>
                    <label class="form-check-input-label" for="termsCheck">I agree to the terms and conditions</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>
    </div>

</body>
</html>
