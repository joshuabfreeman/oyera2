<!DOCTYPE html>
<html lang="en">
<head>
 <title>Customer Profile Display</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body style="background-color: #918f8f;">
    <div style="background-color: rgb(0, 6, 97); padding: 18px; text-align: center; color: #FFFDD0;">

    </div>
        <div class="card shadow-sm mb-4">
            <div class="card-header border-0 text-center pt-4 pb-3" style="background-color: #f8f9fa;">
                <div class="rounded-circle bg-secondary text-white d-inline-flex align-items-center justify-content-center mb-2" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-fill fs-1"></i>
                </div>
                <h4 class="mb-0 text-dark">Joshua B Freeman</h4>
                <small class="text-muted">Customer ID: 001</small>
            </div>
            <div class="card-body px-4">
                <h5 class="card-title border-bottom pb-2 mb-3 text-secondary">Account Details</h5>
                <div class="row g-3">
                    <div class="col-12 col-sm-6">
                        <label class="text-muted small d-block">Phone Number</label>
                        <span class="fw-bold"><i class="bi bi-telephone me-2 text-primary"></i>+256 748 886 707</span>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="text-muted small d-block">Email Address</label>
                        <span class="fw-bold"><i class="bi bi-envelope me-2 text-primary"></i>jbayo056@gmail.com</span>
                    </div>
                    <div class="col-12 col-sm-6">
                        <label class="text-muted small d-block">Vehicle Registration Number</label>
                        <span class="fw-bold"><i class="primary"></i>UA 000AB </span>
                    </div>
                </div>
                </div>
                <h5 class="card-title border-bottom pb-2 mt-4 mb-3 text-secondary">Recent Service Request</h5>
                <div class="p-3 bg-light rounded border">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <strong class="text-dark">Oil Change & Wheel alignment
                        </strong>
                    <p class="small text-muted mb-0">Assigned Technician: Eng. James Kakooza.</p>
                </div>
            </div>
            <div class="card-footer bg-white border-top p-3">
                <div class="row g-2">
                    <div class="col-6">
                        <button class="btn btn-outline-primary w-100 btn-sm">
                            <i class="bi bi-pencil-square me-1"></i> Edit Profile
                        </button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-primary w-100 btn-sm">
                            <i class="bi bi-plus-circle me-1"></i> New Request
                        </button>
                    </div>
                </div>
            </div>
        </div>    
    </div>

</body>
</html>
